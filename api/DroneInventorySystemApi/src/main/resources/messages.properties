# 共通エラーメッセージ
invalid.input.name=partsNameが不正です。1文字以上50文字以内で入力してください。
invalid.input.amount=amountReceiveが不正です。1から9999の数値を入力してください。
invalid.input.allParameters=検索条件がNullまたは空です。少なくとも1つの条件を指定してください。

# 在庫数範囲チェック
amountMinGtMax=amountMin は amountMax 以下でなければなりません

# 必須項目チェック
transactionTypeIsRequiredOrInvalid=transactionTypeは必須項目で、値はRECEIVEでなければなりません。
transactionDateIsRequired=transactionDateは必須項目です。
transactionDateInvalidFormat=transactionDateの形式が不正です。
supplierNameIsRequired=supplierNameは必須項目です。
purchaseOrderNoIsRequired=purchaseOrderNoは必須項目です。
operatorNameIsRequired=operatorNameは必須項目です。
itemsIsRequired=itemsは必須項目です。
stockIdIsRequired=stockIdは必須項目です。
partsNameIsRequired=partsNameは必須項目です。
amountReceiveIsRequired=amountReceiveは必須項目です。

# 数値チェック
stockIdMustBePositive=stockIdは1以上でなければなりません。
stockIdMustBeNumeric=stockIdは数値でなければなりません。
centerIdIsRequired=centerIdは必須項目です。
centerIdMustBePositive=centerIdは1以上でなければなりません。
centerIdMustBeNumeric=centerIdは数値でなければなりません。
categoryIdIsRequired=categoryIdは必須項目です。
categoryIdMustBePositive=categoryIdは1以上でなければなりません。
categoryIdMustBeNumeric=categoryIdは数値でなければなりません。
amountReceiveMustBePositive=amountReceiveは1以上でなければなりません。
amountReceiveMustBeNumeric=amountReceiveは数値でなければなりません。

# 最大値超過チェック（追加）
stockIdTooLarge=stockIdが許容範囲を超えています。
centerIdTooLarge=centerIdが許容範囲を超えています。
categoryIdTooLarge=categoryIdが許容範囲を超えています。
amountReceiveTooLarge=amountReceiveが許容範囲を超えています。

# 文字数チェック（remarks / description）
remarksInvalidLength=descriptionが不正です。1文字以上500文字以内で入力してください。