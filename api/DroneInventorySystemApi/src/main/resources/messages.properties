# 共通エラーメッセージ
invalid.input.name=名前が不正です。1文字以上50文字以内で入力してください。
invalid.input.amount=個数が不正です。1から9999の数値を入力してください。
invalid.input.allParameters=検索条件がNullまたは空です。少なくとも1つの条件を指定してください。

# 在庫数範囲チェック
amountMinGtMax=amount_min は amount_max 以下でなければなりません

# 必須項目チェック
transactionTypeIsRequiredOrInvalid=transaction_typeは必須項目で、値はRECEIVEでなければなりません。
transactionDateIsRequired=transaction_dateは必須項目です。
transactionDateInvalidFormat=transaction_dateの形式が不正です。
supplierNameIsRequired=supplier_nameは必須項目です。
purchaseOrderNoIsRequired=purchase_order_noは必須項目です。
operatorNameIsRequired=operator_nameは必須項目です。
itemsIsRequired=itemsは必須項目です。
stockIdIsRequired=stock_idは必須項目です。
partsNameIsRequired=parts_nameは必須項目です。
receiveAmountIsRequired=receive_amountは必須項目です。

# 数値チェック
stockIdMustBePositive=stock_idは1以上でなければなりません。
stockIdMustBeNumeric=stock_idは数値でなければなりません。
centerIdIsRequired=center_idは必須項目です。
centerIdMustBePositive=center_idは1以上でなければなりません。
centerIdMustBeNumeric=center_idは数値でなければなりません。
categoryIdIsRequired=category_idは必須項目です。
categoryIdMustBePositive=category_idは1以上でなければなりません。
categoryIdMustBeNumeric=category_idは数値でなければなりません。
receiveAmountMustBePositive=receive_amountは1以上でなければなりません。
receiveAmountMustBeNumeric=receive_amountは数値でなければなりません。