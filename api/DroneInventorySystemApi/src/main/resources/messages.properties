invalid.input.name = 名前が不正です。1文字以上50文字以内で入力してください。
invalid.input.amount=個数が不正です。1から9999の数値を入力してください。
invalid.input.allParameters=検索条件がNullまたは空です。少なくとも1つの条件を指定してください。

# 在庫数範囲チェック
amountMinGtMax=amount_min は amount_max 以下でなければなりません

# 必須項目チェック
stockIdIsRequired=stock_idは必須項目です。

# 空要素・非数値チェック
centerIdsInvalidElement=center_id のリストに空または非数値が含まれています
categoryIdsInvalidElement=category_id のリストに空または非数値が含まれています
stockIdsInvalidElement=stock_id のリストに空または非数値が含まれています


# PartsReceivingUpdateValidator 用チェック項目
transactionTypeIsRequiredOrInvalid=transaction_type は必須項目で、値は RECEIVE 固定です
transactionDateIsRequired=transaction_date は必須項目です（ISO 8601形式で指定してください）
transactionDateTooLong=transaction_date は最大20文字までです
transactionDateInvalidFormat=transaction_date は ISO 8601形式（例：2025-11-29T15:40:00Z）で指定してください
supplierNameIsRequired=supplier_name は必須項目です
purchaseOrderNoIsRequired=purchase_order_no は必須項目です
operatorNameIsRequired=operator_name は必須項目です
itemsIsRequired=items は必須項目です（1件以上指定してください）

# items 配列内のチェック
items.stockIdIsRequired=items[].stock_id は必須項目です
items.centerIdIsRequired=items[].center_id は必須項目です
items.categoryIdIsRequired=items[].category_id は必須項目です
items.partsNameIsRequired=items[].parts_name は必須項目です
items.receiveAmountMustBePositive=items[].receive_amount は 1以上の数値を指定してください
